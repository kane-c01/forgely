name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  HUSKY: 0

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @forgely/api prisma:generate
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ci_test_secret_must_be_at_least_32_chars_long_xxxxxxxxxxxx

  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        app:
          - '@forgely/web'
          - '@forgely/app'
          - '@forgely/storefront'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @forgely/api prisma:generate
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely

      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} build
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely
          NEXT_PUBLIC_APP_URL: https://app.forgely.cn
          NEXT_PUBLIC_WEB_URL: https://forgely.cn
