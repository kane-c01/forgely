# Forgely local dev stack — one-shot Postgres + Redis + MinIO + Mailpit.
#
#   docker compose -f infra/docker/compose.dev.yml up -d
#   docker compose -f infra/docker/compose.dev.yml ps
#   docker compose -f infra/docker/compose.dev.yml down -v   # nuke volumes
#
# Connection strings (drop into your root .env):
#   DATABASE_URL=postgresql://forgely:forgely@localhost:5432/forgely
#   REDIS_URL=redis://localhost:6379
#   R2_ACCOUNT_ID=local           R2_ACCESS_KEY_ID=forgely-dev
#   R2_SECRET_ACCESS_KEY=forgely-dev-secret
#   R2_ENDPOINT=http://localhost:9000

name: forgely-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: forgely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forgely
      POSTGRES_USER: forgely
      POSTGRES_PASSWORD: forgely
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --locale=C'
    ports:
      - '5432:5432'
    volumes:
      - forgely-pg-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forgely -d forgely']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: forgely-redis
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'allkeys-lru',
      ]
    ports:
      - '6379:6379'
    volumes:
      - forgely-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: forgely-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forgely-dev
      MINIO_ROOT_PASSWORD: forgely-dev-secret
      MINIO_REGION_NAME: us-east-1
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - forgely-minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    container_name: forgely-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 forgely-dev forgely-dev-secret &&
        mc mb -p local/forgely-assets || true &&
        mc mb -p local/forgely-uploads || true &&
        mc mb -p local/forgely-backups || true &&
        mc anonymous set download local/forgely-assets || true &&
        echo '[forgely] MinIO buckets ready'
      "
    restart: 'no'

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: forgely-mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://localhost:8025/api/v1/info']
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  forgely-pg-data:
  forgely-redis-data:
  forgely-minio-data:
