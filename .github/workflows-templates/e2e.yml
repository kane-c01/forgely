name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  HUSKY: 0

jobs:
  playwright:
    name: Playwright (apps/web)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forgely
          POSTGRES_USER: forgely
          POSTGRES_PASSWORD: forgely
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm --filter @forgely/web exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm --filter @forgely/api prisma:generate
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely

      - name: Build apps/web
        run: pnpm --filter @forgely/web build
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_APP_URL: https://app.forgely.cn
          NEXT_PUBLIC_WEB_URL: https://forgely.cn

      - name: Run Playwright tests
        run: pnpm --filter @forgely/web test:e2e
        env:
          DATABASE_URL: postgresql://forgely:forgely@localhost:5432/forgely
          REDIS_URL: redis://localhost:6379
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
